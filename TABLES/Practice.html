<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table {
            border-collapse: collapse;
        }
        td {
            border: 1px solid black;
            padding: 8px;
        }
        thead {
            background-color: #beaaaa;
        }
        tfoot {
            background-color: #e6ffe6;
        }
        .row1 {
            background-color: #d9d9d9;
        }
        .col1 {
            background-color: #ed7373;
        }
        .col2{
            background-color: #c5bcbc;
        }
        .col3{
            background-color: #e6e6e6;
        }
       
    </style>
</head>
<body>
    <h1>1.Rowspan Example</h1>
    <table border="2">
        <thead>
            <tr>
            <td>Student</td>
            <td>Subject</td>
            <td>Marks</td>
        </tr>
        </thead>
        <tfoot>
            <tr>
            <td rowspan="3" class="row1" >Alice</td>
            <td>Maths</td>
            <td>85</td>
            
        </tr>
        <tr>
            
            <td>Science</td>
            <td>90</td>
        </tr>
        <tr>
            
            <td>English</td>
            <td>78</td>
        </tr>
        <tr>
            <td rowspan="2" class="row1">Bob</td>
            <td>Maths</td>
            <td>88</td>
        </tr>
        <tr>
            
            <td>Science</td>
            <td>92</td>
        </tr>
        </tfoot>
    </table>
    <h1>2.Colspan Example</h1>
    <table>
        
       <thead class="col1">
         <tr>
            <td colspan="3" >Student Details</td>
            
            
            <td>Contact</td>

        </tr>
       </thead>
        <tbody >
            <tr class="col2">
          
            <td>ID</td>
            <td>Name</td>
            <td>Course</td>
            <td>Phone</td>
        </tr>
        <tr class="col3">
            <td>101</td>
            <td>John Doe</td>
            <td>BCA</td>
            <td>123-456-7890</td>

        </tr>
        <tr class="col3">
            <td>102</td>
            <td>Jane Smith</td>
            <td>BBA</td>
            <td>987-654-3210</td>

        </tr>
        </tbody>
    </table>
</body>
</html>
